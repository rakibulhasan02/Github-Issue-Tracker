<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awasome cdn-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- google font  -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- linked daisyUI cdn -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- link css -->
 <link rel="stylesheet" href="./css/style.css">

</head>
<body>
   
    <!-- navbar section -->
     <section class="w-11/12 mx-auto">

        <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">

    <div class="flex items-center gap-2">
       <img class="h-8 w-8 object-cover" src="./assets/github-logo.png" alt="">

    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>

    </div>


  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
    <!-- <i class="fa-solid fa-magnifying-glass"></i> -->
    
  </div>
</div>

     </section>

     <section class="container mx-auto mt-10 bg-base-100  shadow-xl rounded-2xl py-5 px-8">
        <div class="space-x-3">
            <button class="btn btn-primary btn-xl px-10 py-3">All</button>
        <button  class="btn btn-xl px-10 py-3">Open</button><button class="btn btn-xl px-10 py-3">Closed</button>
        
        </div>
        
     </section>
     <section class="container mx-auto mt-10 bg-base-100  shadow-xl rounded-2xl py-5 px-8 space-y-4
     ">
        

        <!-- container section -->
         <div class="flex justify-between items-center">
            <!-- left -->
            <div class="flex gap-3 items-center ">
                <div class="w-12 h-12 rounded-[100%] bg-[#ECE4FF] flex justify-center items-center "><img class="w-8 h-8" src="./assets/Aperture.png" alt=""></div>
                <div>

                    <h2 class="text-2xl font-bold"><span>50</span> Issues</h2>
                    <p class="text-gray-500">
                        Track and manage your project issues
                    </p>
                    
                </div>
            </div>

            <!-- right -->
            <div class="flex gap-4">

                <p><span class="bg-green-600 rounded-[100%] w-1 h-1"><i class="fa-regular fa-circle" style="color: #479c80;"></i></span>
                    
                    Open
                </p>
                <p>

                    <span class="bg-[#A855F7] rounded-[100%] w-1 h-1"><i class="fa-regular fa-circle" style="color: #A855F7;"></i></span>
                    Closed
                </p>
            </div>
         </div>

         <hr class="text-gray-200">
         <!-- all card section -->

         <div id="all-cards" class="p-5 grid gird-cols-4">

                <div class="card">
                    <div class="flex justify-between">
                            <img src="./assets/Open-Status.png" alt="">
                        
                        <p class="btn  bg-red-300 ">High</p>
                    </div>
                </div>
                <div class="card">
                    <div class="flex justify-between">
                            <img src="./assets/Open-Status.png" alt="">
                        
                        <p class="btn  bg-red-300 ">High</p>
                    </div>
                </div>
                <div class="card">
                    <div class="flex justify-between">
                            <img src="./assets/Open-Status.png" alt="">
                        
                        <p class="btn  bg-red-300 ">High</p>
                    </div>
                </div>
                <div class="card">
                    <div class="flex justify-between">
                            <img src="./assets/Open-Status.png" alt="">
                        
                        <p class="btn  bg-red-300 ">High</p>
                    </div>
                </div>

         </div>


        
     </section>



    <!-- js connected -->
    <!-- <script src="./js/index.js"></script> -->
</body>
</html>
