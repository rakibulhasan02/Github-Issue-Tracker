<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Log In</title>

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awasome cdn-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- google font  -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- linked daisyUI cdn -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- link css -->
 <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    <!-- login section -->

    <section  class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl border border-primary p-5 mt-10">

        <!-- logo -->
         <div class="mx-auto text-center space-y-2">
            <div class="flex justify-center items-center"><img  src="./assets/github-logo.png" alt=""></div>
            <h2>GitHub Issues Tracker</h2>
            <p>Sign in to manage your issues</p>
         </div>
       <!--login form -->
       <div class="mx-auto">
         <fieldset class="fieldset  border-base-300 rounded-box w-xs border p-4">
  

  <label class="label">Username</label>
  <input id="login-username" value="" type="text" class="input" placeholder="Enter Username" />
            <p class="text-left  text-purple-950">Default: admin</p>


  <label class="label">Password</label>
  <input id="login-password" value="" type="password" class="input" placeholder="Enter Password" />
            <p class="text-left text-purple-950">Default: admin123</p>


  <button id="login-btn" class="btn btn-primary mt-3">Sign In</button>
</fieldset>
       </div>



       <!-- demo-credential -->
            <div class="text-center ">
                <div class="flex items-center gap-2 mb-1">
                    <div class="flex-1 h-px bg-gray-300"></div>
                    <span class="text-gray-500 text-sm">OR</span>
                    <div class="flex-1 h-px bg-gray-300"></div>
                </div>

                <p class="text-sm text-gray-500 ">Demo Credentials:</p>

                <div class="bg-base-200 rounded-lg py-1 px-20 inline-block shadow-sm">
                    <p class="text-sm"><span class="font-semibold">Username:</span> admin</p>
                    <p class="text-sm"><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>
    </section>

    <!-- js connected -->
    <script src="./js/index.js"></script>
</body>
</html>
